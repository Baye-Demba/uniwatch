{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Dashboard — Flux en direct</h2>
<div class="row g-3">
    {% for i in range(1, 5) %}
    <div class="col-md-6">
        <div class="card p-2">
            <p class="text-center mb-1">Caméra {{ i }}</p>
            <img src="/stream/{{ i }}"
                 class="img-fluid rounded"
                 style="width:100%; height:300px; object-fit:cover;"
                 onerror="this.src='';this.alt='Hors ligne';">
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
