{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Historique des Alertes</h2>
<div class="card p-4">
    <table class="table table-dark table-striped">
        <thead>
            <tr><th>#</th><th>Caméra</th><th>Message</th><th>Email envoyé</th><th>Date</th></tr>
        </thead>
        <tbody>
        {% for alert in alerts %}
        <tr>
            <td>{{ alert[0] }}</td>
            <td>{{ alert[1] }}</td>
            <td>{{ alert[2] }}</td>
            <td>{% if alert[3] %}<span class="badge bg-success">Oui</span>{% else %}<span class="badge bg-secondary">Non</span>{% endif %}</td>
            <td>{{ alert[4] }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
