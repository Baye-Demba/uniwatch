{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Gestion des Caméras</h2>
<div class="card p-4 mb-4">
    <h5>Ajouter une caméra</h5>
    <form method="POST" action="/cameras/add">
        <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" name="nom" class="form-control bg-dark text-light border-secondary" placeholder="Ex: Entrée Garage" required>
        </div>
        <div class="mb-3">
            <label class="form-label">URL RTSP</label>
            <input type="text" name="rtsp_url" class="form-control bg-dark text-light border-secondary" placeholder="rtsp://admin:pass@IP:554/stream" required>
        </div>
        <button type="submit" class="btn btn-primary">Ajouter</button>
    </form>
</div>
<div class="card p-4">
    <h5>Caméras enregistrées</h5>
    <table class="table table-dark table-striped mt-3">
        <thead><tr><th>#</th><th>Nom</th><th>Statut</th><th>Ajoutée le</th></tr></thead>
        <tbody>
        {% for cam in cameras %}
        <tr>
            <td>{{ cam[0] }}</td>
            <td>{{ cam[1] }}</td>
            <td>{% if cam[2] == 'online' %}<span class="badge bg-success">En ligne</span>{% else %}<span class="badge bg-danger">Hors ligne</span>{% endif %}</td>
            <td>{{ cam[3] }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
